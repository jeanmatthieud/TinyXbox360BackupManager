name: 🐛 Create Bug Report
description: Report a bug or crash in TinyWiiBackupManager.
title: '[Bug] '
labels:
  - bug

body:
  - type: textarea
    id: text
    attributes:
      label: 📝 Report
    validations:
      required: true

  - type: checkboxes
    id: agreement
    attributes:
      label: 🏴‍☠️ Piracy
      options:
        - label: This bug report is absolutely not related to piracy, and I legally own any game I'm having issues with. I'm aware any mention of piracy would get this issue report deleted.
          required: true

  - type: input
    id: os
    attributes:
      label: 💻 Which OS I am on
      placeholder: ex. Windows 11
    validations:
      required: true

  - type: input
    id: download
    attributes:
      label: 📦 Which package did I download
      placeholder: ex. TinyXbox360BackupManager-vX.X.X-windows-x86_64.zip
    validations:
      required: true

  - type: input
    id: fs
    attributes:
      label: 💽 Which filesystem is my drive on
      placeholder: ex. FAT32
    validations:
      required: false

  - type: input
    id: games
    attributes:
      label: 👾 I'm having issues with this game(s)
      description: Insert here any game id of games you legally own
      placeholder: ex. SMNP01
    validations:
      required: false
