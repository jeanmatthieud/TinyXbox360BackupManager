name: Release

# Fully automated release pipeline driven by semantic-release.
#
# On push to `main`:
#   1. `version` runs semantic-release in dry-run to compute the next version
#      from the Conventional Commits since the last release.
#   2. The `build-*` jobs bump Cargo.toml to that version and compile, so the
#      binary embeds the correct `env!("CARGO_PKG_VERSION")` (used by the
#      self-updater in crates/core/src/updates.rs).
#   3. `release` runs semantic-release for real: it generates CHANGELOG.md,
#      commits the version bump, tags `vX.Y.Z` and publishes the GitHub Release
#      with the built assets.
#
# On pull_request: the `build-*` jobs run for validation only (no release).

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ==================================================================================
  #  Stage 1: Compute the next version (semantic-release dry-run).
  # ==================================================================================
  version:
    name: Compute next version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.semantic.outputs.version }}
      published: ${{ steps.semantic.outputs.version != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # semantic-release needs full history + tags

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compute next version
        id: semantic
        run: npx semantic-release --dry-run
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ==================================================================================
  #  Stage 2: Build & Bundle Jobs
  #  Run on pull_request (validation) or when a release is due on push to main.
  # ==================================================================================
  build-linux:
    name: Build for Linux
    needs: version
    if: github.event_name == 'pull_request' || needs.version.outputs.published == 'true'
    runs-on: ${{ matrix.runner }}
    container:
      image: rust:1.97-bullseye
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            arch: x86_64
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-22.04-arm
            arch: aarch64
            target: aarch64-unknown-linux-gnu
          - runner: ubuntu-22.04
            arch: i686
            target: i686-unknown-linux-gnu

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Install LLVM
        run: |
          wget -O /etc/apt/trusted.gpg.d/apt.llvm.org.asc https://apt.llvm.org/llvm-snapshot.gpg.key
          echo "deb http://apt.llvm.org/bullseye/ llvm-toolchain-bullseye-22 main" > /etc/apt/sources.list.d/llvm.list
          apt-get update
          apt-get install -y clang-22 lld-22

      - name: Install i686 dependencies
        if: matrix.arch == 'i686'
        run: |
          dpkg --add-architecture i386
          apt-get update
          apt-get install -y gcc-multilib pkg-config:i386 libfontconfig1-dev:i386

      - name: Install rust-src
        run: rustup component add rust-src

      - name: Download appimagetool
        run: |
          wget "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-${{ matrix.arch }}.AppImage"
          chmod +x appimagetool-${{ matrix.arch }}.AppImage

      - name: Install yq
        run: |
          case "${{ matrix.arch }}" in
            x86_64) YQ_ARCH=amd64 ;;
            aarch64) YQ_ARCH=arm64 ;;
            i686) YQ_ARCH=386 ;;
          esac
          wget -O /usr/local/bin/yq "https://github.com/mikefarah/yq/releases/latest/download/yq_linux_${YQ_ARCH}"
          chmod +x /usr/local/bin/yq

      - name: Set release version
        if: needs.version.outputs.published == 'true'
        run: yq -i '.workspace.package.version = "${{ needs.version.outputs.version }}"' Cargo.toml

      - name: Resolve version name
        id: name
        run: |
          if [ "${{ needs.version.outputs.published }}" = "true" ]; then
            echo "version=${{ needs.version.outputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build binary
        run: |
          cargo build -Z build-std=std,panic_abort --release --target ${{ matrix.target }} --no-default-features --features rustls
          cp target/${{ matrix.target }}/release/txbm-gui TinyXbox360BackupManager
        env:
          RUSTC_BOOTSTRAP: 1
          CC: clang-22
          AR: llvm-ar-22
          CFLAGS: -O3 -flto
          RUSTFLAGS: -C linker-plugin-lto -C link-arg=-fuse-ld=lld-22
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER: clang-22
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: clang-22
          CARGO_TARGET_I686_UNKNOWN_LINUX_GNU_LINKER: clang-22
          PKG_CONFIG_i686_unknown_linux_gnu: i686-pc-linux-gnu-pkg-config

      - name: Package AppImage
        run: |
          cp -rP package/linux/AppDir TinyXbox360BackupManager.AppDir
          install -Dm0755 TinyXbox360BackupManager TinyXbox360BackupManager.AppDir/usr/bin/TinyXbox360BackupManager
          mkdir -p dist
          cd dist
          export VERSION=$(yq '.package.version' Cargo.toml)
          ../appimagetool-${{ matrix.arch }}.AppImage \
            --comp zstd --mksquashfs-opt -Xcompression-level --mksquashfs-opt 19 \
            -u "gh-releases-zsync|jeanmatthieud|TinyXbox360BackupManager|latest|*${{ matrix.arch }}.AppImage.zsync" \
            ../TinyXbox360BackupManager.AppDir \
            "TinyXbox360BackupManager-v${{ steps.name.outputs.version }}-linux-${{ matrix.arch }}.AppImage"
        env:
          ARCH: ${{ matrix.arch }}
          APPIMAGE_EXTRACT_AND_RUN: 1

      - name: Upload Linux distributables
        uses: actions/upload-artifact@v7
        with:
          name: dist-linux-${{ matrix.arch }}
          path: dist/*

  build-windows:
    name: Build for Windows
    needs: version
    if: github.event_name == 'pull_request' || needs.version.outputs.published == 'true'
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            target: aarch64-pc-windows-msvc
          - arch: x64
            target: x86_64-win7-windows-msvc
          - arch: x86
            target: i686-win7-windows-msvc

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Install LLVM
        shell: pwsh
        run: choco install llvm --version 22.1.0 -y

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.97
        with:
          components: rust-src

      - name: Set release version
        if: needs.version.outputs.published == 'true'
        shell: pwsh
        run: |
          $v = "${{ needs.version.outputs.version }}"
          (Get-Content Cargo.toml) -replace '(?m)^version = "[^"]*"', "version = `"$v`"" | Set-Content Cargo.toml

      # UPX packing disabled: it triggers Windows Defender false positives
      # (Trojan:Win32/Wacatac.B!ml) because packed executables have high entropy
      # and atypical section layout typical of malware. Only benefit was download
      # size; not worth the "your app is a trojan" cost.

      - name: Build binary
        shell: pwsh
        run: |
          cargo build -Z build-std=std,panic_abort --release --target ${{ matrix.target }}
          Copy-Item -Path "target\${{ matrix.target }}\release\txbm-gui.exe" -Destination "TinyXbox360BackupManager.exe"
        env:
          RUSTC_BOOTSTRAP: 1
          CC: clang-cl
          AR: llvm-lib
          CFLAGS_x86_64_win7_windows_msvc: /clang:-O3 /clang:-flto /clang:-fuse-ld=lld-link
          CFLAGS_i686_win7_windows_msvc: /clang:-O3 /clang:-flto /clang:-fuse-ld=lld-link
          CFLAGS_aarch64_pc_windows_msvc: -O3 -flto=thin -fuse-ld=lld-link
          CARGO_TARGET_X86_64_WIN7_WINDOWS_MSVC_RUSTFLAGS: -C target-feature=+crt-static -C linker-plugin-lto -C link-arg=/FORCE:MULTIPLE -l dylib=ole32
          CARGO_TARGET_I686_WIN7_WINDOWS_MSVC_RUSTFLAGS: -C target-feature=+crt-static -C linker-plugin-lto -C link-arg=/FORCE:MULTIPLE -l dylib=ole32
          CARGO_TARGET_AARCH64_PC_WINDOWS_MSVC_RUSTFLAGS: -C target-feature=+crt-static -C linker-plugin-lto
          CARGO_TARGET_X86_64_WIN7_WINDOWS_MSVC_LINKER: lld-link
          CARGO_TARGET_AARCH64_PC_WINDOWS_MSVC_LINKER: lld-link
          CARGO_TARGET_I686_WIN7_WINDOWS_MSVC_LINKER: lld-link

      - name: Resolve version name
        id: name
        shell: pwsh
        run: |
          $v = if ("${{ needs.version.outputs.published }}" -eq "true") { "${{ needs.version.outputs.version }}" } else { "${{ github.sha }}" }
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Rename binary
        shell: pwsh
        run: |
          New-Item -Path "dist" -ItemType Directory -Force
          Copy-Item "TinyXbox360BackupManager.exe" "dist\TinyXbox360BackupManager-v${{ steps.name.outputs.version }}-windows-${{ matrix.arch }}.exe"

      - name: Upload Windows distributables
        uses: actions/upload-artifact@v7
        with:
          name: dist-windows-${{ matrix.arch }}
          path: dist/*

  build-macos:
    name: Build for macOS
    needs: version
    if: github.event_name == 'pull_request' || needs.version.outputs.published == 'true'
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            target: aarch64-apple-darwin
          - arch: x86_64
            target: x86_64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Install LLVM and LLD
        run: brew install llvm@22 lld@22

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.97
        with:
          components: rust-src

      - name: Set release version
        if: needs.version.outputs.published == 'true'
        run: |
          brew install yq
          yq -i '.workspace.package.version = "${{ needs.version.outputs.version }}"' Cargo.toml

      - name: Build binary
        run: |
          cargo build -Z build-std=std,panic_abort --release --target ${{ matrix.target }}
          cp target/${{ matrix.target }}/release/txbm-gui TinyXbox360BackupManager
        env:
          RUSTC_BOOTSTRAP: 1
          CC: /opt/homebrew/opt/llvm@22/bin/clang
          AR: /opt/homebrew/opt/llvm@22/bin/llvm-ar
          CFLAGS: -O3 -flto
          RUSTFLAGS: -C linker-plugin-lto -C link-arg=-fuse-ld=/opt/homebrew/opt/lld@22/bin/ld64.lld
          CARGO_TARGET_AARCH64_APPLE_DARWIN_LINKER: ./macos-linker.sh
          CARGO_TARGET_X86_64_APPLE_DARWIN_LINKER: ./macos-linker.sh

      - name: Upload macOS binaries
        uses: actions/upload-artifact@v7
        with:
          name: build-macos-${{ matrix.arch }}
          path: TinyXbox360BackupManager

  build-macos-universal:
    name: Build for macOS (Universal)
    needs: [version, build-macos]
    if: github.event_name == 'pull_request' || needs.version.outputs.published == 'true'
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set release version
        if: needs.version.outputs.published == 'true'
        run: |
          brew install yq
          yq -i '.workspace.package.version = "${{ needs.version.outputs.version }}"' Cargo.toml

      - name: Download macOS binaries
        uses: actions/download-artifact@v8
        with:
          pattern: "build-macos-*"

      - name: Create the .app bundle
        run: |
          cp -r package/macos/App TinyXbox360BackupManager.app
          mkdir -p TinyXbox360BackupManager.app/Contents/MacOS
          VERSION=$(yq '.package.version' Cargo.toml)
          /usr/libexec/PlistBuddy -c "Add :CFBundleShortVersionString string $VERSION" TinyXbox360BackupManager.app/Contents/Info.plist

      - name: Build the app icon
        run: |
          # iconutil does not create parent dirs for its output; the App skeleton
          # ships only Contents/Info.plist, so Resources must be created first.
          mkdir -p TinyXbox360BackupManager.app/Contents/Resources
          iconutil -c icns package/macos/TinyXbox360BackupManager.iconset \
            -o TinyXbox360BackupManager.app/Contents/Resources/TinyXbox360BackupManager.icns

      - name: Build the fat binary
        run: |
          lipo -create \
            -output TinyXbox360BackupManager.app/Contents/MacOS/TinyXbox360BackupManager \
            build-macos-arm64/TinyXbox360BackupManager \
            build-macos-x86_64/TinyXbox360BackupManager
          chmod 755 TinyXbox360BackupManager.app/Contents/MacOS/TinyXbox360BackupManager

      - name: Sign the .app bundle
        run: codesign --force --deep -s - TinyXbox360BackupManager.app

      - name: Install appdmg
        run: npm i -g appdmg

      - name: Resolve version name
        id: name
        run: |
          if [ "${{ needs.version.outputs.published }}" = "true" ]; then
            echo "version=${{ needs.version.outputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Universal DMG
        run: |
          mkdir dist
          appdmg package/macos/appdmg.json "dist/TinyXbox360BackupManager-v${{ steps.name.outputs.version }}-macos-universal.dmg"

      - name: Upload macOS distributables
        uses: actions/upload-artifact@v7
        with:
          name: dist-macos-universal
          path: dist/*

  # ==================================================================================
  #  Stage 3: Release Job — semantic-release publishes the tag + GitHub Release.
  # ==================================================================================
  release:
    name: Create GitHub Release
    if: github.event_name == 'push' && needs.version.outputs.published == 'true'
    runs-on: ubuntu-latest
    needs: [version, build-linux, build-windows, build-macos, build-macos-universal]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true # @semantic-release/git pushes the release commit

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install yq
        run: |
          wget -O /usr/local/bin/yq "https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64"
          chmod +x /usr/local/bin/yq

      - name: Install dependencies
        run: npm ci

      - name: Download distributables
        uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: "dist-*" # matches all final distributable artifacts
          merge-multiple: true # place all matching artifacts into a single 'dist' directory

      - name: Create version.txt
        run: echo -n "${{ needs.version.outputs.version }}" > dist/version.txt # Write without line break

      - name: Semantic Release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
